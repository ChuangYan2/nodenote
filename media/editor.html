<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https: data:; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    /* Base from the theme, but derive surfaces/borders ourselves so contrast is guaranteed
       in ANY theme (some themes' editorWidget/panel-border tokens are near-invisible). */
    --bg: var(--vscode-editor-background, #1e1e1e);
    --ink: var(--vscode-editor-foreground, var(--vscode-foreground, #d4d4d4));
    --soft: var(--vscode-descriptionForeground, color-mix(in srgb, var(--ink) 62%, transparent));
    --faint: color-mix(in srgb, var(--ink) 42%, transparent);
    --side: color-mix(in srgb, var(--ink) 4%, var(--bg));
    --widget: color-mix(in srgb, var(--ink) 7%, var(--bg));
    --line: color-mix(in srgb, var(--ink) 24%, transparent);
    --accent: var(--vscode-focusBorder, #4ea0ff);
    --link: var(--vscode-textLink-foreground, var(--accent));
    --hover: color-mix(in srgb, var(--ink) 11%, transparent);
    --sel: color-mix(in srgb, var(--accent) 26%, transparent);
    --selfg: var(--ink);
    --badge-bg: color-mix(in srgb, var(--ink) 20%, transparent);
    --badge-fg: var(--ink);
    --btn-bg: var(--vscode-button-background, #2563eb);
    --btn-fg: var(--vscode-button-foreground, #ffffff);
    --imp: var(--vscode-charts-red, #f14c4c);
    --tod: var(--vscode-charts-orange, #d18616);
    --opn: var(--vscode-charts-blue, #3794ff);
    --ans: var(--vscode-charts-green, #89d185);
    --prk: var(--vscode-charts-purple, #b180d7);
    --sans: var(--vscode-font-family, -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif);
    --mono: var(--vscode-editor-font-family, ui-monospace,Menlo,Consolas,monospace);
    --fs: var(--vscode-font-size, 13px);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:var(--fs);line-height:1.45;overflow:hidden}
  svg{display:block}.ico{stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
  button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer;background:none;border:none}
  ::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:var(--vscode-scrollbarSlider-background,rgba(128,128,128,.4))}
  ::-webkit-scrollbar-thumb:hover{background:var(--vscode-scrollbarSlider-hoverBackground,rgba(128,128,128,.6))}

  .app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--line);background:var(--side)}
  .title{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .addbar{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--line);background:var(--side)}
  .addbar button{font-size:12px;border-radius:4px;padding:6px 13px;display:inline-flex;align-items:center;gap:6px}
  .addq{background:var(--btn-bg);color:var(--btn-fg);font-weight:600}.addq:hover{filter:brightness(1.12)}
  .addn{color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}.addn:hover{background:var(--hover)}

  .page{overflow:auto;padding:12px 16px 60px;max-width:860px;width:100%;margin:0 auto}
  .empty{color:var(--soft);font-size:13px;text-align:center;margin-top:60px}
  /* pinned cells stick to the top of the page while the rest scrolls under them */
  .pinned{position:sticky;top:-12px;z-index:5;background:var(--bg);padding:12px 0 6px;margin:-12px 0 6px;border-bottom:1px solid var(--line);box-shadow:0 6px 12px -8px rgba(0,0,0,.5)}
  .pinned .hero{margin:0 0 6px}.pinned .hero:last-child{margin-bottom:0}

  .collapsed{display:flex;gap:9px;align-items:center;padding:6px 10px;border-radius:4px;width:100%;text-align:left;color:var(--ink)}
  .collapsed:hover{background:var(--hover)}
  .csp{width:3px;align-self:stretch;border-radius:0;min-height:16px;flex:none}
  .cq{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .cq.untitled{color:var(--faint);font-weight:400}
  .cmeta{font-size:11px;color:var(--soft)}
  .pinmark{color:var(--soft);display:flex}

  .pill{font-size:11px;padding:1px 8px 1px 6px;border-radius:3px;display:inline-flex;gap:5px;align-items:center;font-weight:500}
  .pd{width:8px;height:8px;border-radius:2px}
  .p-important{background:color-mix(in srgb,var(--imp) 16%,transparent);color:var(--imp)} .p-important .pd{background:var(--imp)}
  .p-today{background:color-mix(in srgb,var(--tod) 16%,transparent);color:var(--tod)} .p-today .pd{background:var(--tod)}
  .p-open{background:color-mix(in srgb,var(--opn) 16%,transparent);color:var(--opn)} .p-open .pd{background:var(--opn)}
  .p-answered{background:color-mix(in srgb,var(--ans) 16%,transparent);color:var(--ans)} .p-answered .pd{background:var(--ans)}
  .p-parked{background:color-mix(in srgb,var(--prk) 16%,transparent);color:var(--prk)} .p-parked .pd{background:var(--prk)}

  .hero{position:relative;margin:7px 0;border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:4px;padding:14px 16px 10px;background:var(--widget)}
  .cellbar{position:absolute;top:8px;right:8px;display:flex;gap:1px}
  .cbtn{width:24px;height:24px;border-radius:4px;color:var(--soft);display:flex;align-items:center;justify-content:center}
  .cbtn:hover{background:var(--hover);color:var(--ink)}.cbtn.danger:hover{color:var(--imp)}.cbtn.on{color:var(--accent)}.cbtn.sm{width:20px;height:20px}
  .cbtn.typetog{font-family:var(--mono);font-weight:700;font-size:11px;box-shadow:inset 0 0 0 1px var(--line)}
  .qtitle{font-size:15px;line-height:1.35;font-weight:600;outline:none;border-radius:3px;padding:1px 3px;margin:-1px -3px;padding-right:104px;min-height:1.3em}
  .qtitle:focus{background:var(--hover);box-shadow:inset 0 0 0 1px var(--accent)}
  .qtitle:empty:before{content:'Question or note…';color:var(--faint)}
  .qpills{display:flex;gap:6px;margin:9px 0 0;flex-wrap:wrap}
  .qbody{font-size:13px;color:var(--soft);margin:9px 0 0;line-height:1.55;outline:none;border-radius:3px;white-space:pre-wrap;min-height:1.3em}
  .qbody:focus{background:var(--hover);box-shadow:inset 0 0 0 1px var(--accent);color:var(--ink)}
  .qbody:empty:before{content:'Add detail…';color:var(--faint)}
  .md{cursor:text}
  .md p{margin:0 0 6px}.md p:last-child{margin:0}
  .md ul{margin:4px 0;padding-left:18px}.md li{margin:1px 0}
  .md code{font-family:var(--mono);background:var(--hover);padding:0 4px;border-radius:3px}
  .md strong{color:var(--ink);font-weight:600}.md em{font-style:italic}
  .md img{max-width:100%;border-radius:4px;margin:4px 0;display:block}
  .md a.exlink{color:var(--link)}
  .md .link{color:var(--link);background:color-mix(in srgb,var(--link) 14%,transparent);border-radius:3px;padding:0 5px;cursor:pointer;font-weight:500}
  .md .link:hover{background:color-mix(in srgb,var(--link) 28%,transparent)}
  .md .ph{color:var(--faint)}
  .backlinks{margin-top:9px;font-size:11px;color:var(--faint)}
  .backlinks .link{color:var(--link);cursor:pointer}

  .ans{margin:13px 0 0}
  .tabbar{display:flex;flex-wrap:wrap;gap:3px;border-bottom:1px solid var(--line);margin-bottom:9px}
  .atab{font-size:12px;padding:4px 10px;border-radius:4px 4px 0 0;color:var(--soft);background:transparent;border:1px solid transparent;border-bottom:none;display:inline-flex;align-items:center;gap:8px;position:relative;top:1px}
  .atab:hover{background:var(--hover);color:var(--ink)}
  .atab.active{color:var(--ink);font-weight:600;background:var(--bg);border-color:var(--line);box-shadow:inset 0 -2px 0 var(--accent)}
  .atab .htext{outline:none;min-width:16px}
  .atabx{color:var(--soft);font-size:15px;line-height:1}.atabx:hover{color:var(--imp)}
  .atab.addt{color:var(--link);border:1px dashed var(--line);font-weight:400}
  .apanel .ab{font-size:13px;color:var(--ink);line-height:1.55;outline:none;border-radius:3px;white-space:pre-wrap;min-height:1.4em;padding:2px 3px}
  .apanel .ab:focus{background:var(--hover);box-shadow:inset 0 0 0 1px var(--accent)}
  .apanel .ab:empty:before{content:'Write the answer…';color:var(--faint)}
  .apanel .ab code{font-family:var(--mono);background:var(--hover);padding:0 4px;border-radius:3px}
  .addfirst{font-size:12px;color:var(--link)}
  .foot{margin-top:11px;padding-top:8px;border-top:1px solid var(--line);font-size:11px;color:var(--faint)}

  .pop{position:fixed;z-index:50;background:var(--widget);border:1px solid var(--vscode-widget-border,var(--line));border-radius:4px;box-shadow:0 2px 8px var(--vscode-widget-shadow,rgba(0,0,0,.36));padding:4px;min-width:170px}
  .pop label{display:flex;gap:9px;align-items:center;font-size:13px;padding:5px 9px;border-radius:4px;cursor:pointer;color:var(--ink)}
  .pop label:hover{background:var(--hover)}.pop input{accent-color:var(--accent)}
  [tabindex]:focus-visible,button:focus-visible,[contenteditable]:focus-visible{outline:1px solid var(--accent);outline-offset:1px}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="title" id="title"></div>
    <span style="font-size:11px;color:var(--faint)">⇧⏎ next cell · Q/N toggles type</span>
  </div>
  <div class="page" id="page"></div>
  <div class="addbar">
    <button class="addq" data-add="question"><svg class="ico" viewBox="0 0 24 24" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>New question</button>
    <button class="addn" data-add="note"><svg class="ico" viewBox="0 0 24 24" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>New note</button>
  </div>
</div>

<script nonce="{{nonce}}">
const vscode = acquireVsCodeApi();
const STATUSES=[{id:'important',color:'var(--imp)'},{id:'today',color:'var(--tod)'},{id:'open',color:'var(--opn)'},{id:'answered',color:'var(--ans)'},{id:'parked',color:'var(--prk)'}];
const PRIORITY=['important','today','open','answered','parked'];
const pageEl=document.getElementById('page'), titleEl=document.getElementById('title');
let view=[]; let ui=vscode.getState()||{focus:0,active:{}}; let saveTimer=null; const dirty=new Set(); let focusNew=null; let editing=null, base='';

const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isQuestion=it=>it.cell.meta.type==='question'||(!it.cell.meta.type&&/\?/.test(it.cell.headingText||''));
const statusList=it=>(it.cell.meta.status||[]);
const dominant=it=>{const s=statusList(it);for(const p of PRIORITY)if(s.includes(p))return p;return null;};
const colorOf=id=>(STATUSES.find(s=>s.id===id)||{}).color||'var(--faint)';
const newMeta=ex=>Object.assign({status:[],flags:[],extra:{}},ex||{});
const nowISO=()=>new Date().toISOString().slice(0,16)+'Z';
const pinned=it=>!!(it.cell.meta.extra&&it.cell.meta.extra.pin);
const persist=()=>vscode.setState(ui);
function placeCaretEnd(el){try{const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=getSelection();s.removeAllRanges();s.addRange(r);}catch(e){}}

function save(immediate){clearTimeout(saveTimer);
  const go=()=>{const t=nowISO();dirty.forEach(i=>{if(view[i])view[i].cell.meta.updated=t;});dirty.clear();vscode.postMessage({type:'edit',view});};
  if(immediate)go();else saveTimer=setTimeout(go,250);}

const ICON={tag:'<path d="M3 3h8l9 9-8 8-9-9z"/><circle cx="7.5" cy="7.5" r="1.3"/>',plus:'<path d="M12 5v14M5 12h14"/>',trash:'<path d="M4 7h16M9 7V5h6v2M7 7l1 13h8l1-13"/>',prev:'<path d="M15 18l-6-6 6-6"/>',next:'<path d="M9 6l6 6-6 6"/>',pin:'<path d="M9 3h6l-1 6 3 3v2h-5v6l-1 1-1-1v-6H4v-2l3-3z"/>'};
const svg=(p,w)=>`<svg class="ico" viewBox="0 0 24 24" width="${w||15}" height="${w||15}">${p}</svg>`;

function pills(it){const ps=statusList(it).map(s=>`<span class="pill p-${s}"><span class="pd"></span>${s}</span>`).join('');return ps?`<div class="qpills">${ps}</div>`:'';}

// Minimal, XSS-safe markdown renderer (escape first, then re-introduce only sanitized tags).
function md(src){
  const e=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const okSrc=u=>{u=u.trim();return /^(https?:|data:image\/)/i.test(u)?u:(/^[\w./\- ]+$/.test(u)?base+u:'');};
  const okHref=u=>{u=u.trim();return /^(https?:|mailto:)/i.test(u)?u:'';};
  const inline=t=>{t=e(t);
    t=t.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,(m,a,u)=>{const s=okSrc(u);return s?`<img alt="${a}" src="${s}">`:m;});
    t=t.replace(/\[\[([^\]]+)\]\]/g,(m,id)=>`<span class="link" data-link="${id.trim()}">${id.trim()}</span>`);
    t=t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,tx,u)=>{const h=okHref(u);return h?`<a class="exlink" data-href="${h}">${tx}</a>`:m;});
    t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
    t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<em>$2</em>');
    return t;};
  const out=[];let ul=false;
  String(src||'').split(/\n/).forEach(line=>{
    if(/^\s*[-*]\s+/.test(line)){if(!ul){out.push('<ul>');ul=true;}out.push('<li>'+inline(line.replace(/^\s*[-*]\s+/,''))+'</li>');return;}
    if(ul){out.push('</ul>');ul=false;}
    if(line.trim()==='')return;
    out.push('<p>'+inline(line)+'</p>');});
  if(ul)out.push('</ul>');
  return out.join('');
}
function it_title(it){return stripIcon(it.cell.headingText)||'Untitled';}
function cellRefsId(it,id){const re=new RegExp('\\[\\['+id.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\]\\]');
  return re.test(it.cell.body||'')||it.answers.some(a=>re.test(a.body||''));}

function heroHTML(it,idx){
  const q=isQuestion(it), ds=dominant(it), dc=ds?colorOf(ds):null, pin=pinned(it);
  const heroStyle=dc?` style="border-left-color:${dc};background:color-mix(in srgb, ${dc} 7%, var(--widget))"`:'';
  let bar=`<button class="cbtn typetog" data-type="${idx}" title="${q?'Question — click to make a note':'Note — click to make a question'}">${q?'Q':'N'}</button>`;
  bar+=`<button class="cbtn" data-status="${idx}" title="Set status">${svg(ICON.tag,14)}</button>`;
  if(q)bar+=`<button class="cbtn" data-addans="${idx}" title="Add answer">${svg(ICON.plus,15)}</button>`;
  bar+=`<button class="cbtn ${pin?'on':''}" data-pin="${idx}" title="${pin?'Unpin':'Pin to top'}">${svg(ICON.pin,14)}</button>`;
  bar+=`<button class="cbtn danger" data-del="${idx}" title="Delete">${svg(ICON.trash,14)}</button>`;
  const bodyHTML = editing===('cbody:'+idx)
    ? `<div class="qbody editing" contenteditable data-cbody="${idx}">${esc(it.cell.body)}</div>`
    : `<div class="qbody md" data-editkey="cbody:${idx}">${it.cell.body?md(it.cell.body):'<span class="ph">Add detail…</span>'}</div>`;
  let ansHTML='';
  if(q){const n=it.answers.length;let a=ui.active[idx]||0;if(a>=n)a=Math.max(0,n-1);
    if(n){const cur=it.answers[a];
      const tabs=it.answers.map((ans,i)=>{const label=esc(ans.headingText)||('Answer '+(i+1));
        return i===a
          ? `<span class="atab active"><span class="htext" contenteditable data-ahead="${idx}:${i}">${esc(ans.headingText)||('Answer '+(i+1))}</span><button class="atabx" data-delans="${idx}:${i}" title="Remove answer">×</button></span>`
          : `<button class="atab" data-tabsel="${idx}:${i}">${label}</button>`;}).join('');
      const abHTML = editing===('abody:'+idx+':'+a)
        ? `<div class="ab editing" contenteditable data-abody="${idx}:${a}">${esc(cur.body)}</div>`
        : `<div class="ab md" data-editkey="abody:${idx}:${a}">${cur.body?md(cur.body):'<span class="ph">Write the answer…</span>'}</div>`;
      ansHTML=`<div class="ans"><div class="tabbar">${tabs}<button class="atab addt" data-addans="${idx}" title="Add answer">+</button></div><div class="apanel">${abHTML}</div></div>`;
    }else ansHTML=`<div class="ans"><button class="addfirst" data-addans="${idx}">+ Add an answer</button></div>`;
  }
  const upd=it.cell.meta.updated?'updated '+rel(it.cell.meta.updated):(it.cell.meta.created?'created '+rel(it.cell.meta.created):'');
  const myId=it.cell.meta.id; let back='';
  if(myId){const refs=view.map((o,j)=>({o,j})).filter(x=>x.j!==idx&&cellRefsId(x.o,myId));
    if(refs.length)back=`<div class="backlinks">↩ Referenced by ${refs.map(r=>`<span class="link" data-jump="${r.j}">${esc(it_title(r.o))}</span>`).join(', ')}</div>`;}
  return `<div class="hero"${heroStyle}><div class="cellbar">${bar}</div>
    <div class="qtitle" contenteditable data-head="${idx}">${esc(it.cell.headingText)}</div>
    ${pills(it)}
    ${bodyHTML}
    ${ansHTML}${back}${upd?`<div class="foot">${upd}</div>`:''}</div>`;
}
function collapsedHTML(it,idx){
  const q=isQuestion(it), d=dominant(it), pin=pinned(it);
  const tag=d?`<span class="pill p-${d}"><span class="pd"></span>${d}</span>`:'';
  const ans=q&&it.answers.length?`<span class="cmeta">${it.answers.length} ans</span>`:'';
  const t=it.cell.headingText.trim();
  return `<button class="collapsed" data-focus="${idx}"><span class="csp" style="background:${colorOf(d)||'var(--line)'}"></span>${pin?`<span class="pinmark">${svg(ICON.pin,12)}</span>`:''}<span class="cq ${t?'':'untitled'}">${t?esc(t):'Untitled'}</span>${ans}${tag}</button>`;
}
function order(){return view.map((it,i)=>({it,i})).sort((a,b)=>(pinned(b.it)?1:0)-(pinned(a.it)?1:0));}
function render(){
  if(!view.length){pageEl.innerHTML=`<div class="empty">No ideas yet — press “New”.</div>`;persist();return;}
  if(!view[ui.focus])ui.focus=0;
  const all=view.map((it,i)=>({it,i}));
  const pin=all.filter(x=>pinned(x.it)), rest=all.filter(x=>!pinned(x.it));
  const pinHTML=pin.length?`<div class="pinned">${pin.map(x=>heroHTML(x.it,x.i)).join('')}</div>`:'';
  const restHTML=rest.map(x=>x.i===ui.focus?heroHTML(x.it,x.i):collapsedHTML(x.it,x.i)).join('');
  pageEl.innerHTML=pinHTML+restHTML;
  if(focusNew!=null){const el=pageEl.querySelector(`[data-head="${focusNew}"]`);focusNew=null;if(el){el.focus();placeCaretEnd(el);}}
  persist();
}
function rel(iso){try{const d=new Date(iso),ms=new Date()-d,day=864e5;if(ms<36e5)return Math.max(1,Math.round(ms/6e4))+'m';if(ms<day)return Math.round(ms/36e5)+'h';return Math.round(ms/day)+'d';}catch(e){return iso;}}

pageEl.addEventListener('click',e=>{const t=e.target;
  const f=t.closest('[data-focus]');if(f&&!t.closest('.hero')){ui.focus=+f.dataset.focus;render();return;}
  const ty=t.closest('[data-type]');if(ty){const i=+ty.dataset.type;view[i].cell.meta.type=isQuestion(view[i])?'note':'question';dirty.add(i);render();save(true);return;}
  if(t.closest('[data-status]')){openPop(t.closest('[data-status]'),+t.closest('[data-status]').dataset.status);return;}
  const pn=t.closest('[data-pin]');if(pn){const i=+pn.dataset.pin;const ex=view[i].cell.meta.extra||(view[i].cell.meta.extra={});if(ex.pin)delete ex.pin;else ex.pin='1';dirty.add(i);render();save(true);return;}
  const ts=t.closest('[data-tabsel]');if(ts){const[i,a]=ts.dataset.tabsel.split(':').map(Number);ui.active[i]=a;render();return;}
  const aa=t.closest('[data-addans]');if(aa){const i=+aa.dataset.addans;view[i].answers.push({meta:newMeta({type:'answer'}),headingLevel:(view[i].cell.headingLevel||2)+1,headingText:'Answer',body:''});ui.active[i]=view[i].answers.length-1;dirty.add(i);render();save(true);return;}
  const da=t.closest('[data-delans]');if(da){const[i,a]=da.dataset.delans.split(':').map(Number);view[i].answers.splice(a,1);ui.active[i]=Math.max(0,a-1);dirty.add(i);render();save(true);return;}
  const del=t.closest('[data-del]');if(del){const i=+del.dataset.del;view.splice(i,1);ui.focus=Math.max(0,i-1);render();save(true);return;}
  const jp=t.closest('[data-jump]');if(jp){editing=null;ui.focus=+jp.dataset.jump;render();return;}
  const lk=t.closest('[data-link]');if(lk){const id=lk.dataset.link;const j=view.findIndex(o=>o.cell.meta.id===id||o.cell.headingText.trim()===id);if(j>=0){editing=null;ui.focus=j;render();}return;}
  const ek=t.closest('[data-editkey]');if(ek){editing=ek.dataset.editkey;render();const v=editing.slice(editing.indexOf(':')+1);const el=pageEl.querySelector(editing.startsWith('cbody')?`[data-cbody="${v}"]`:`[data-abody="${v}"]`);if(el){el.focus();placeCaretEnd(el);}return;}
});
pageEl.addEventListener('input',e=>{const t=e.target,v=t.innerText;
  if(t.dataset.head!==undefined){view[+t.dataset.head].cell.headingText=v;dirty.add(+t.dataset.head);}
  else if(t.dataset.cbody!==undefined){view[+t.dataset.cbody].cell.body=v;dirty.add(+t.dataset.cbody);}
  else if(t.dataset.ahead!==undefined){const[i,a]=t.dataset.ahead.split(':').map(Number);view[i].answers[a].headingText=v;dirty.add(i);}
  else if(t.dataset.abody!==undefined){const[i,a]=t.dataset.abody.split(':').map(Number);view[i].answers[a].body=v;dirty.add(i);}
  else return; save(false);});
pageEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.shiftKey&&e.target.isContentEditable){ // Jupyter-style: commit + go to next cell
    e.preventDefault();
    const ds=e.target.dataset; const key=ds.head!==undefined?ds.head:(ds.cbody!==undefined?ds.cbody:(ds.ahead!==undefined?ds.ahead:ds.abody));
    const idx=key!==undefined?parseInt(key,10):ui.focus;
    const ord=order().map(x=>x.i); const pos=ord.indexOf(idx); editing=null;
    if(pos>=0&&pos<ord.length-1){ ui.focus=ord[pos+1]; focusNew=ui.focus; render(); }
    else { view.push({cell:{meta:newMeta({type:'question',created:nowISO()}),headingLevel:2,headingText:'',body:''},answers:[]}); ui.focus=view.length-1; focusNew=ui.focus; dirty.add(ui.focus); render(); save(true); }
    return;
  }
  if(e.key==='Enter'&&!e.shiftKey&&e.target.dataset&&(e.target.dataset.head!==undefined||e.target.dataset.ahead!==undefined)){
    e.preventDefault();const body=e.target.closest('.hero,.slide').querySelector('.qbody,.ab');if(body)body.focus();}});
pageEl.addEventListener('focusout',e=>{save(true);if(editing&&e.target&&(e.target.dataset.cbody!==undefined||e.target.dataset.abody!==undefined)){editing=null;setTimeout(render,0);}});
function fieldKey(t){ const d=t.dataset||{};
  if(d.head!==undefined)return 'head:'+d.head; if(d.cbody!==undefined)return 'cbody:'+d.cbody;
  if(d.ahead!==undefined)return 'ahead:'+d.ahead; if(d.abody!==undefined)return 'abody:'+d.abody; return null; }
function applyImageToField(key,mdText){ if(!key)return; const p=key.split(':'),kind=p[0];
  if(kind==='cbody'){const i=+p[1];view[i].cell.body=(view[i].cell.body?view[i].cell.body+'\n':'')+mdText;dirty.add(i);}
  else if(kind==='abody'){const i=+p[1],a=+p[2];view[i].answers[a].body=(view[i].answers[a].body?view[i].answers[a].body+'\n':'')+mdText;dirty.add(i);}
  else if(kind==='head'){const i=+p[1];view[i].cell.headingText=(view[i].cell.headingText+' '+mdText).trim();dirty.add(i);}
  else if(kind==='ahead'){const i=+p[1],a=+p[2];view[i].answers[a].headingText=(view[i].answers[a].headingText+' '+mdText).trim();dirty.add(i);}
  editing=null; render(); save(true); }
// Paste: images → saved to assets/ by the extension; everything else → PLAIN TEXT (strip formatting). LaTeX is plain text, kept verbatim.
pageEl.addEventListener('paste',e=>{ const t=e.target; if(!t||!t.isContentEditable)return;
  const cd=e.clipboardData||window.clipboardData; if(!cd)return;
  const items=cd.items?Array.prototype.slice.call(cd.items):[];
  const img=items.find(it=>it.kind==='file'&&/^image\//.test(it.type));
  if(img){ const file=img.getAsFile(); if(file){ e.preventDefault(); const key=fieldKey(t);
    const rd=new FileReader(); rd.onload=()=>{ const b64=String(rd.result||'').split(',')[1]||''; if(b64)vscode.postMessage({type:'saveImage',mime:file.type,dataBase64:b64,target:key}); };
    rd.readAsDataURL(file); return; } }
  let text=cd.getData('text/plain'); if(!text)return; // nothing pastable as text → let default handle it
  if(t.dataset&&(t.dataset.head!==undefined||t.dataset.ahead!==undefined)) text=text.replace(/\s*\n\s*/g,' ').trim(); // titles stay single-line
  e.preventDefault();
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){ const r=sel.getRangeAt(0); r.deleteContents(); const node=document.createTextNode(text); r.insertNode(node); r.setStartAfter(node); r.collapse(true); sel.removeAllRanges(); sel.addRange(r); }
  else { t.textContent += text; }
  t.dispatchEvent(new Event('input',{bubbles:true})); });
window.addEventListener('blur',()=>save(true));

document.querySelector('.addbar').addEventListener('click',e=>{const b=e.target.closest('[data-add]');if(!b)return;
  view.push({cell:{meta:newMeta({type:b.dataset.add,created:nowISO()}),headingLevel:2,headingText:'',body:''},answers:[]});
  ui.focus=view.length-1;focusNew=ui.focus;editing=null;dirty.add(ui.focus);render();save(true);});

document.addEventListener('keydown',e=>{ if(e.target.isContentEditable)return;
  const ord=order().map(x=>x.i);const pos=ord.indexOf(ui.focus);
  if(e.key==='ArrowDown'&&pos<ord.length-1){ui.focus=ord[pos+1];render();e.preventDefault();}
  else if(e.key==='ArrowUp'&&pos>0){ui.focus=ord[pos-1];render();e.preventDefault();}
  else if((e.key==='ArrowRight'||e.key==='ArrowLeft')){const it=view[ui.focus];if(it&&isQuestion(it)&&it.answers.length){let a=(ui.active[ui.focus]||0)+(e.key==='ArrowRight'?1:-1);ui.active[ui.focus]=Math.max(0,Math.min(it.answers.length-1,a));render();}}});

let pop=null;
function closePop(){if(pop){pop.remove();pop=null;document.removeEventListener('click',outside,true);}}
function outside(e){if(pop&&!pop.contains(e.target)&&!e.target.closest('[data-status]'))closePop();}
function openPop(anchor,idx){closePop();const meta=view[idx].cell.meta;
  pop=document.createElement('div');pop.className='pop';
  pop.innerHTML=STATUSES.map(s=>`<label><input type="checkbox" data-tog="${s.id}" ${(meta.status||[]).includes(s.id)?'checked':''}><span style="width:9px;height:9px;border-radius:2px;background:${s.color}"></span>${s.id}</label>`).join('');
  document.body.appendChild(pop);const r=anchor.getBoundingClientRect();pop.style.left=Math.min(r.left,innerWidth-185)+'px';pop.style.top=(r.bottom+4)+'px';
  pop.addEventListener('change',ev=>{const id=ev.target.dataset.tog;let st=meta.status||[];if(ev.target.checked){if(!st.includes(id))st.push(id);}else st=st.filter(x=>x!==id);
    meta.status=STATUSES.filter(s=>st.includes(s.id)).map(s=>s.id);dirty.add(idx);render();save(true);const a=document.querySelector('[data-status="'+idx+'"]');if(a)openPop(a,idx);});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closePop();},{once:true});
  setTimeout(()=>document.addEventListener('click',outside,true),0);}

window.addEventListener('message',e=>{const m=e.data;
  if(m.type==='load'){view=m.view||[];if(m.title!==undefined)titleEl.textContent=m.title;if(m.base!==undefined)base=m.base;if(ui.focus>=view.length)ui.focus=0;render();}
  else if(m.type==='imageSaved'){applyImageToField(m.target,'![]('+m.path+')');}});
render();vscode.postMessage({type:'ready'});
</script>
</body>
